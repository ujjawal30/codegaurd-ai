name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Which service to deploy"
        required: true
        type: choice
        options:
          - frontend
          - backend
          - both
  push:
    branches:
      - "release/*"
      - production
    paths:
      - "frontend/**"
      - "backend/**"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.set-outputs.outputs.frontend }}
      backend: ${{ steps.set-outputs.outputs.backend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths (push only)
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

      - name: Set outputs
        id: set-outputs
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SERVICE="${{ github.event.inputs.service }}"
            echo "frontend=$( [ "$SERVICE" == 'frontend' ] || [ "$SERVICE" == 'both' ] && echo true || echo false )" >> $GITHUB_OUTPUT
            echo "backend=$( [ "$SERVICE" == 'backend' ] || [ "$SERVICE" == 'both' ] && echo true || echo false )" >> $GITHUB_OUTPUT
          else
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> $GITHUB_OUTPUT
            echo "backend=${{ steps.filter.outputs.backend }}" >> $GITHUB_OUTPUT
          fi

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    uses: ./.github/workflows/build-deploy.yaml
    with:
      context: ./frontend
      image_name: ${{ vars.FE_IMAGE_NAME }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      SERVICE_ID: ${{ secrets.RAILWAY_FE_SERVICE_ID }}

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/build-deploy.yaml
    with:
      context: ./backend
      image_name: ${{ vars.BE_IMAGE_NAME }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      SERVICE_ID: ${{ secrets.RAILWAY_BE_SERVICE_ID }}
