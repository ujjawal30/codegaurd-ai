name: Build & Deploy

on:
  workflow_call:
    inputs:
      context:
        description: "Docker build context path (e.g. ./frontend)"
        required: true
        type: string
      image_name:
        description: "Docker Image name"
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        description: "Docker Hub username"
        required: true
      DOCKER_PASSWORD:
        description: "Docker Hub token/password"
        required: true
      RAILWAY_TOKEN:
        description: "Railway Project token"
        required: true
      SERVICE_ID:
        description: "Railway service ID"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway redeploy --service ${{ secrets.SERVICE_ID }} --yes
